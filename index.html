<!DOCTYPE html>
<html>
<head>
    <title>Accessing...</title>
    <style>
        body {
            background-color: black;
            color: #00ff00;
            font-family: monospace;
            padding: 20px;
            font-size: 18px;
        }

        #text {
            white-space: pre-line;
        }

        #cursor {
            display: inline;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

    </style>
</head>
<body>

<div id="text"></div><span id="cursor">|</span>

<script>
let message = `Milý Janíčko,
čo Ti poviem, akosi mi dochádzajú nápady na darčeky. 
Ver, že je to čoraz ťažšie Ti vymyslieť dobrý darček. 
Spojila som skúsenosti z minulého roka na robenie stránky
a trocha Pythonu, aby som Ti mohla dať tento super-čuper list. 
Ja viem, ja viem zas a znova som sa prekonala. Ale čo neurobiť
pre svojho milovaného kamaráta :) Poviem Ti, po minuloročnej 
traume som si povedala, že už v živote ma nikto neuvidí 
programovať. Maximálne na hodine informatiky programovať štvorčeky, 
idúce zo strany na stranu a hovoriť im autá. Ako sa vraví nikdy 
nehovor nikdy. Asi Ťa fakt budem musieť mať rada. Tento rok to 
bolo trochu lepšie, lebo som vedela, čo ma čaká. 
Všetko najlepšie k narodeninám!!! Veľa šťastia, zdravia a hlavne 
lásky. 17 je už obdivuhodný vek (viem o čom hovorím, už pol roka mám 17).
Mal by si si kúpiť Dolgit, zlatý krém na kĺby a nejaké to sérum
s koenzýmom Q10 proti vráskam (tiež vlastné skúsenosti). 
Ale neboj sa, ja Ťa budem mať rada aj postaršieho s nedokonalosťami. 
Už teraz Ťa mám veľmi rada. Uži si svoj dník. Ver, že na Teba myslím, 
takže ak sa Ti o mne bude snívať alebo na mňa nebudeš môcť prestať 
myslieť, vieš kto za to môže a čo som robila. Samozrejme čarovala
a keď sme pri tom, karty Ťa pozdravujú a tiež prajú všetko najlepšie.
Ževraj budeš mať šťastný, radostný a hlavne dlhý život 
s kým iným ako so mnou. To bol, samozrejme, vtip. 
Alebo aj nie. Kto vie?
Fun fact: Vedel si o tom, že vo filme Twilight sága mal 
Edward Cullen 17, keď ho premenili na upíra? 
Mal by si to vedieť, lebo sme ten film videli!!! 
PS: Viem, že si sa celý čas pri čítaní usmieval. A ak nie, 
si fejk kamoš a v skutočnosti ma nemáš rád.

-Tvoja Biba. 

`;


let i = 0;
let speed = 40;
let output = "";

function typeWriter() {
    if (i < message.length) {
        if (message[i] === "<") {
            let tagEnd = message.indexOf(">", i);
            output += message.substring(i, tagEnd + 1);
            i = tagEnd + 1;
        } else {
            output += message[i];
            i++;
        }

        document.getElementById("text").innerHTML = output;
        setTimeout(typeWriter, speed);
    }
}

typeWriter();
</script>

</body>
</html>
